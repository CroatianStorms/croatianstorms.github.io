  /* -----------------------------------------------TOP MENU STYLE -----------------------------------*/
  .menu-item {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  justify-content: flex-start;
  min-width: 36px;
  max-width: 36px;               /* start small */
  height: 36px;
  border-radius: 50%;
  overflow: hidden;
  transition: max-width 0.35s ease, border-radius 0.35s ease, box-shadow 0.35s ease;
  background: transparent;
  color: white;
  text-decoration: none;
}

.menu-item .text {
  position: absolute;
  opacity: 0;
  visibility: hidden;
  white-space: nowrap;
  font-weight: 600;
  font-size: 0.8rem;
  transition: opacity 0.25s ease 0.1s;
}

.menu-item:hover {
  max-width: 260px;              /* larger max-width to fit longer text like "PHOTOGRAPHY" */
  padding: 0 12px;             /* ← Updated: 0 top/bottom, 12px left/right */
  background: #1e3a8a;
  border-radius: 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  border: 2px solid rgba(255, 255, 255, 0.2);
}

.menu-item:hover .text {
  position: static;              /* reset position for smooth appearance */
  opacity: 1;
  visibility: visible;
  color: white;
}
.menu-item svg {
  transition: all 0.3s ease;
}

.menu-item:hover svg {
  display: none;                    /* hide SVG icon on hover */
}

/* Desktop: horizontal menu */
.nav-menu {
  display: flex !important;
}
/* Hamburger lines initial positions */
.hamburger .top-bar {
  top: 14px;
}

.hamburger .mid-bar {
  top: 21px;
}

.hamburger .bottom-bar {
  top: 28px;
}

/* When menu is open → animate to X */
#menu-toggle:checked ~ label .top-bar {
  top: 21px;
  transform: rotate(45deg);
}

#menu-toggle:checked ~ label .mid-bar {
  opacity: 0;
  top: 21px;
}

#menu-toggle:checked ~ label .bottom-bar {
  top: 21px;
  transform: rotate(-45deg);
}

/* Make sure the icon container doesn't shift layout */
.hamburger {
  position: relative;
}
/* Mobile: hide horizontal, show hamburger */
@media (max-width: 768px) {
  .hamburger {
    display: block !important;
    margin-left: auto !important;      /* pushes to the right */
    margin-right: 55px !important;    /* removes any right gap */
  }

  .nav-menu {
    display: none !important;
  }
  
  #menu-toggle:checked ~ .mobile-menu {
  display: flex !important;
  }
  header {
    padding-right: 0 !important;       /* no right padding on mobile */
  }
}

  <div id="map"></div>

  <script>
    var map = L.map('map', {
  zoomControl: false,        // disable default zoom
  attributionControl: true
  }).setView([45.1, 16.0], 7);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);

    // Approximate radar coverage (in km) used to build image bounds/rings
    var radarRangeKm = 240;
    // Positive value shifts only the visual range ring slightly to the south (down on map)
    var radarRangeCenterSouthShiftKm = 4.6;
    var radarConfigs = [
      {
        id: 'bilogora',
        name: 'Bilogora',
        center: [45.9206, 17.4750],
        circle: [45.8835, 17.2005],
        imageUrl: 'https://vrijeme.hr/bilogora-stat.png',
        animationUrl: 'https://vrijeme.hr/anim_bilogora.gif',
        pillText: 'BIL',
        timeBoxWidthPx: 240
      },
      {
        id: 'puntijarka',
        name: 'Puntijarka',
        center: [45.9449, 16.2428],
        circle: [45.9078, 15.9683],
        imageUrl: 'https://vrijeme.hr/puntijarka-stat.png',
        animationUrl: 'https://vrijeme.hr/anim_puntijarka.gif',
        pillText: 'PUN',
        timeBoxWidthPx: 250
      }
    ];

    function buildRadarBounds(radarCenter) {
      var latDelta = radarRangeKm / 97;
      var lonDelta = radarRangeKm / (102 * Math.cos(radarCenter[0] * Math.PI / 181));
      return [
        [radarCenter[0] - latDelta, radarCenter[1] - lonDelta], // SW
        [radarCenter[0] + latDelta, radarCenter[1] + lonDelta]  // NE
      ];
    }

    function getRadarImageUrl(baseUrl) {
      // Cache-busting query string so browser fetches a fresh radar image
      return baseUrl + '?t=' + Date.now();
    }

    function getRadarRangeRingCenterLatLng(radarCircleCenter) {
      return [
        radarCircleCenter[0] - (radarRangeCenterSouthShiftKm / 111),
        radarCircleCenter[1]
      ];
    }

    function destinationPoint(lat, lng, bearingDeg, distanceKm) {
      var earthRadiusKm = 6371;
      var bearing = bearingDeg * Math.PI / 180;
      var lat1 = lat * Math.PI / 180;
      var lng1 = lng * Math.PI / 180;
      var angularDistance = distanceKm / earthRadiusKm;
      var lat2 = Math.asin(
        Math.sin(lat1) * Math.cos(angularDistance) +
        Math.cos(lat1) * Math.sin(angularDistance) * Math.cos(bearing)
      );
      var lng2 = lng1 + Math.atan2(
        Math.sin(bearing) * Math.sin(angularDistance) * Math.cos(lat1),
        Math.cos(angularDistance) - Math.sin(lat1) * Math.sin(lat2)
      );
      return [lat2 * 180 / Math.PI, lng2 * 180 / Math.PI];
    }

    function applyRadarCircularMask(radarLayer) {
      if (!radarLayer) return;
      var overlayImg = radarLayer.overlay.getElement();
      if (!overlayImg) return;

      var mapRect = map.getContainer().getBoundingClientRect();
      var imageRect = overlayImg.getBoundingClientRect();
      if (!imageRect.width || !imageRect.height) return;

      var centerContainerPoint = map.latLngToContainerPoint(radarLayer.circleCenter);
      var eastPointLatLng = destinationPoint(
        radarLayer.circleCenter[0],
        radarLayer.circleCenter[1],
        90,
        radarRangeKm
      );
      var eastContainerPoint = map.latLngToContainerPoint(eastPointLatLng);
      var pixelRadius = Math.hypot(
        eastContainerPoint.x - centerContainerPoint.x,
        eastContainerPoint.y - centerContainerPoint.y
      );
      if (!isFinite(pixelRadius) || pixelRadius <= 0) return;

      var centerX = mapRect.left + centerContainerPoint.x - imageRect.left;
      var centerY = mapRect.top + centerContainerPoint.y - imageRect.top;
      var circleMask = 'circle(' + pixelRadius.toFixed(2) + 'px at ' + centerX.toFixed(2) + 'px ' + centerY.toFixed(2) + 'px)';
      overlayImg.style.clipPath = circleMask;
      overlayImg.style.webkitClipPath = circleMask;
    }

    function createRadarLayer(config) {
      var bounds = buildRadarBounds(config.center);
      var overlay = L.imageOverlay(
        getRadarImageUrl(config.imageUrl),
        bounds,
        { opacity: 0.72, interactive: false }
      ).addTo(map);

      var ringCenter = getRadarRangeRingCenterLatLng(config.circle);
      var ring = L.circle(ringCenter, {
        radius: radarRangeKm * 1000,
        color: 'rgba(20, 20, 20, 0.88)',
        weight: 2,
        opacity: 0.9,
        fill: false,
        interactive: false
      }).addTo(map);

      var pillIcon = L.divIcon({
        className: '',
        html: '<div class="radar-pill-marker">' + config.pillText + '</div>',
        iconSize: [34, 20],
        iconAnchor: [17, 10]
      });
      var marker = L.marker(config.circle, { icon: pillIcon })
        .addTo(map)
        .bindTooltip(config.name);
      marker.on('click', function() {
        selectRadarById(config.id);
      });

      return {
        id: config.id,
        name: config.name,
        imageUrl: config.imageUrl,
        animationUrl: config.animationUrl,
        timeBoxWidthPx: config.timeBoxWidthPx,
        bounds: bounds,
        circleCenter: config.circle,
        overlay: overlay,
        ring: ring,
        marker: marker
      };
    }
    var radarLayers = [];
    for (var r = 0; r < radarConfigs.length; r++) {
      radarLayers.push(createRadarLayer(radarConfigs[r]));
    }

    // DHMZ reflectivity legend (Z in dBZ) on left side
    var dbzLegendControl = L.control({ position: 'topleft' });
    dbzLegendControl.onAdd = function() {
      var div = L.DomUtil.create('div', 'dbz-legend');
      var levels = [
        { dbz: 70, color: '#ff00ff' },
        { dbz: 65, color: '#9955c9' },
        { dbz: 60, color: '#960000' },
        { dbz: 55, color: '#ff0000' },
        { dbz: 50, color: '#f57e00' },
        { dbz: 45, color: '#ffbb00' },
        { dbz: 40, color: '#ffff00' },
        { dbz: 35, color: '#00fa0b' },
        { dbz: 30, color: '#00c027' },
        { dbz: 25, color: '#008509' },
        { dbz: 20, color: '#004e80' },
        { dbz: 15, color: '#0055be' },
        { dbz: 10, color: '#00aeff' },
        { dbz: 2, color: '#a5a5a5' }
      ];
      div.innerHTML = '<div class="dbz-legend-title">Z: MAX (dBZ)</div>';
      for (var i = 0; i < levels.length; i++) {
        var row = document.createElement('div');
        row.className = 'dbz-legend-row';
        row.innerHTML =
          '<span class="dbz-legend-swatch" style="background:' + levels[i].color + ';"></span>' +
          '<span>' + levels[i].dbz + ' dBZ</span>';
        div.appendChild(row);
      }
      L.DomEvent.disableClickPropagation(div);
      L.DomEvent.disableScrollPropagation(div);
      return div;
    };
    dbzLegendControl.addTo(map);

    var radarTimeControl = L.control({ position: 'bottomleft' });
    var radarTimeImageEl = null;
    var radarAnimationControl = L.control({ position: 'bottomleft' });
    var isRadarAnimationPlaying = false;

    radarAnimationControl.onAdd = function() {
      var div = L.DomUtil.create('div', 'dbz-legend radar-animation-control');
      div.innerHTML =
        '<button class="radar-animation-button radar-play-button" type="button">Play</button>' +
        '<button class="radar-animation-button radar-stop-button" type="button">Stop</button>';

      var playButton = div.querySelector('.radar-play-button');
      var stopButton = div.querySelector('.radar-stop-button');

      playButton.addEventListener('click', function() {
        playSelectedRadarAnimation();
      });
      stopButton.addEventListener('click', function() {
        stopSelectedRadarAnimation();
      });

      L.DomEvent.disableClickPropagation(div);
      L.DomEvent.disableScrollPropagation(div);
      return div;
    };
    radarTimeControl.onAdd = function() {
      var div = L.DomUtil.create('div', 'dbz-legend radar-time-control');
      div.innerHTML =
        '<div class="radar-time-label">Radarska slika (vrijeme):</div>' +
        '<div class="radar-time-value"><img class="radar-time-image" alt="Radar timestamp strip" /></div>';
      radarTimeImageEl = div.querySelector('.radar-time-image');
      L.DomEvent.disableClickPropagation(div);
      L.DomEvent.disableScrollPropagation(div);
      return div;
    };
    radarTimeControl.addTo(map);
    radarAnimationControl.addTo(map);

    function updateRadarTimestampDisplay(imageUrl) {
      if (!radarTimeImageEl) return;
      radarTimeImageEl.src = imageUrl;
    }

    function getRadarOverlaySourceUrl(radarLayer) {
      if (isRadarAnimationPlaying && radarLayer.id === selectedRadarId) {
        return radarLayer.animationUrl;
      }
      return radarLayer.imageUrl;
    }

    function refreshRadarLayerSource(radarLayer) {
      radarLayer.overlay.setUrl(getRadarImageUrl(getRadarOverlaySourceUrl(radarLayer)));
      radarLayer.overlay.setBounds(radarLayer.bounds);
    }

    function playSelectedRadarAnimation() {
      var selectedRadarLayer = getSelectedRadarLayer();
      if (!selectedRadarLayer) return;
      isRadarAnimationPlaying = true;
      refreshRadarLayerSource(selectedRadarLayer);
    }

    function stopSelectedRadarAnimation() {
      isRadarAnimationPlaying = false;
      for (var i = 0; i < radarLayers.length; i++) {
        refreshRadarLayerSource(radarLayers[i]);
      }
      syncRadarTimestampFromOverlay();
    }

    function updateRadarTimeValueBoxWidth() {
      if (!radarTimeImageEl) return;
      var timeValueBox = radarTimeImageEl.closest('.radar-time-value');
      if (!timeValueBox) return;
      var selectedRadarLayer = getSelectedRadarLayer();
      var widthPx = selectedRadarLayer && selectedRadarLayer.timeBoxWidthPx
        ? selectedRadarLayer.timeBoxWidthPx
        : 240;
      timeValueBox.style.width = widthPx + 'px';
    }

    var selectedRadarId = 'bilogora';
    function getSelectedRadarLayer() {
      for (var i = 0; i < radarLayers.length; i++) {
        if (radarLayers[i].id === selectedRadarId) return radarLayers[i];
      }
      return null;
    }

    function selectRadarById(radarId) {
      selectedRadarId = radarId;
      for (var i = 0; i < radarLayers.length; i++) {
        var radarLayer = radarLayers[i];
        var isSelected = radarLayer.id === selectedRadarId;
        radarLayer.overlay.setOpacity(isSelected ? 0.72 : 0);
        radarLayer.ring.setStyle({ opacity: isSelected ? 0.9 : 0, fillOpacity: 0 });
        if (isSelected) {
          refreshRadarLayerSource(radarLayer);
        }

        var markerElement = radarLayer.marker.getElement();
        if (markerElement) {
          var pillElement = markerElement.querySelector('.radar-pill-marker');
          if (pillElement) {
            pillElement.classList.toggle('is-selected', isSelected);
          }
        }
      }
      updateRadarTimeValueBoxWidth();
      applyAllRadarMasks();
      syncRadarTimestampFromOverlay();
    }

    function syncRadarTimestampFromOverlay() {
      var selectedRadarLayer = getSelectedRadarLayer();
      if (!selectedRadarLayer) return;
      var overlayImg = selectedRadarLayer.overlay.getElement();
      if (!overlayImg) return;
      var resolvedUrl = overlayImg.currentSrc || overlayImg.src || '';
      if (!resolvedUrl) return;
      updateRadarTimestampDisplay(resolvedUrl);
    }

    function applyAllRadarMasks() {
      for (var i = 0; i < radarLayers.length; i++) {
        if (radarLayers[i].id === selectedRadarId) {
          applyRadarCircularMask(radarLayers[i]);
        }
      }
    }

    function refreshRadarOverlays() {
      for (var i = 0; i < radarLayers.length; i++) {
        var radarLayer = radarLayers[i];
        refreshRadarLayerSource(radarLayer);
      }
      applyAllRadarMasks();
    }

    // Render radar immediately and then auto-refresh every minute
    for (var i = 0; i < radarLayers.length; i++) {
      (function(radarLayer) {
        radarLayer.overlay.on('load', function() {
          if (radarLayer.id === selectedRadarId) {
            applyRadarCircularMask(radarLayer);
            syncRadarTimestampFromOverlay();
          }
        });
      })(radarLayers[i]);
    }
    map.on('zoomend moveend resize', applyAllRadarMasks);
    selectRadarById(selectedRadarId);
    refreshRadarOverlays();
    var radarRefreshIntervalMs = 60 * 1000;
    setInterval(refreshRadarOverlays, radarRefreshIntervalMs);

    for (var i = 0; i < radarLayers.length; i++) {
      radarLayers[i].ring.bringToFront();
    }

    map.invalidateSize();
    
    // Custom zoom control in top-right, below header
    var zoomControl = L.control({position: 'topright'});
    
    zoomControl.onAdd = function(map) {
      var div = L.DomUtil.create('div', 'custom-zoom');
      div.innerHTML = 
        '<a href="#" class="leaflet-control-zoom-in" title="Zoom in">+</a>' +
        '<a href="#" class="leaflet-control-zoom-out" title="Zoom out">−</a>';
      
      // Add click functionality
      div.querySelector('.leaflet-control-zoom-in').addEventListener('click', function(e) {
        e.preventDefault();
        map.zoomIn();
      });
      
      div.querySelector('.leaflet-control-zoom-out').addEventListener('click', function(e) {
        e.preventDefault();
        map.zoomOut();
      });
      
      return div;
    };
    
    zoomControl.addTo(map);

</script>
</body>
</html>
