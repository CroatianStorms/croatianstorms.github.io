  <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; margin: 0; padding: 0; margin: 0 auto;}
    h1, h2, h3, h4, p, li, span, em, strong {
    color: #ffffff;
  }

    /* Optional: nicer tooltip look */

      background: rgba(0,0,0,0.75);
      color: white;
      border-radius: 4px;
      padding: 4px 8px;

      border: none;

  /* -----------------------------------------------TOP MENU STYLE -----------------------------------*/
  .menu-item {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  justify-content: flex-start;
  min-width: 36px;
  max-width: 36px;               /* start small */
  height: 36px;
  border-radius: 50%;
  overflow: hidden;
  transition: max-width 0.35s ease, border-radius 0.35s ease, box-shadow 0.35s ease;
  background: transparent;
  color: white;
  text-decoration: none;
}

.menu-item .text {
  position: absolute;
  opacity: 0;
  visibility: hidden;
  white-space: nowrap;
  font-weight: 600;
  font-size: 0.8rem;
  transition: opacity 0.25s ease 0.1s;
}

.menu-item:hover {
  max-width: 260px;              /* larger max-width to fit longer text like "PHOTOGRAPHY" */
  padding: 0 12px;             /* ← Updated: 0 top/bottom, 12px left/right */
  background: #1e3a8a;
  border-radius: 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  border: 2px solid rgba(255, 255, 255, 0.2);
}

.menu-item:hover .text {
  position: static;              /* reset position for smooth appearance */
  opacity: 1;
  visibility: visible;
  color: white;
}
.menu-item svg {
  transition: all 0.3s ease;
}

.menu-item:hover svg {
  display: none;                    /* hide SVG icon on hover */
}

/* Desktop: horizontal menu */
.nav-menu {
  display: flex !important;
}
/* Hamburger lines initial positions */
.hamburger .top-bar {
  top: 14px;
}

.hamburger .mid-bar {
  top: 21px;
}

.hamburger .bottom-bar {
  top: 28px;
}

/* When menu is open → animate to X */
#menu-toggle:checked ~ label .top-bar {
  top: 21px;
  transform: rotate(45deg);
}

#menu-toggle:checked ~ label .mid-bar {
  opacity: 0;
  top: 21px;
}

#menu-toggle:checked ~ label .bottom-bar {
  top: 21px;
  transform: rotate(-45deg);
}

/* Make sure the icon container doesn't shift layout */
.hamburger {
  position: relative;
}
/* Mobile: hide horizontal, show hamburger */
@media (max-width: 768px) {
  .hamburger {
    display: block !important;
    margin-left: auto !important;      /* pushes to the right */
    margin-right: 55px !important;    /* removes any right gap */
  }

  .nav-menu {
    display: none !important;
  }
  
  #menu-toggle:checked ~ .mobile-menu {
  display: flex !important;
  }
  header {
    padding-right: 0 !important;       /* no right padding on mobile */
  }
}

.sidebar-item .text {

  <div id="map"></div>

  <script>
    var map = L.map('map', {
  zoomControl: false,        // disable default zoom
  attributionControl: true
  }).setView([45.1, 16.0], 7);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);

    // DHMZ Bilogora radar overlay (static PNG)
    // Radar location provided: 45.9206, 17.4651
    var bilogoraRadarCenter = [45.9206, 17.4750];
    var bilogoraRadarCircle = [45.8835, 17.2005];
    // Approximate radar coverage (in km) used to build image bounds
    var radarRangeKm = 240;
    var latDelta = radarRangeKm / 97;
    var lonDelta = radarRangeKm / (102 * Math.cos(bilogoraRadarCenter[0] * Math.PI / 181));
    var bilogoraBounds = [
      [bilogoraRadarCenter[0] - latDelta, bilogoraRadarCenter[1] - lonDelta], // SW
      [bilogoraRadarCenter[0] + latDelta, bilogoraRadarCenter[1] + lonDelta]  // NE
    ];

    function getRadarImageUrl() {
      // Cache-busting query string so browser fetches a fresh radar image
      return 'https://vrijeme.hr/bilogora-stat.png?t=' + Date.now();
    }

    // Crop this many pixels from the top of the radar image (set to 0 to disable)
    var radarCropTopPx = 60;

    function applyRadarTopCropMask() {
      if (radarCropTopPx <= 0) return;
      var overlayImg = radarOverlay.getElement();
      if (!overlayImg) return;

      // Keep original transform generated by Leaflet, only visually hide top strip
      overlayImg.style.clipPath = 'inset(' + radarCropTopPx + 'px 0 0 0)';
      overlayImg.style.webkitClipPath = 'inset(' + radarCropTopPx + 'px 0 0 0)';
    }

    function registerRadarCropMask() {
      radarOverlay.on('load', applyRadarTopCropMask);
      map.on('zoomend moveend resize', applyRadarTopCropMask);
    }

    var radarOverlay = L.imageOverlay(
      getRadarImageUrl(),
      bilogoraBounds,
      { opacity: 0.72, interactive: false }
    );
    radarOverlay.addTo(map);

    function refreshRadarOverlay() {
      var sourceUrl = getRadarImageUrl();
      radarOverlay.setUrl(sourceUrl);
      radarOverlay.setBounds(bilogoraBounds);
      applyRadarTopCropMask();
    }

    // Render radar immediately and then auto-refresh every minute
    registerRadarCropMask();
    refreshRadarOverlay();
    var radarRefreshIntervalMs = 60 * 1000;
    setInterval(refreshRadarOverlay, radarRefreshIntervalMs);

    // Fixed-size radar position pill marker
    var bilogoraPillIcon = L.divIcon({
      className: '',
      html: '<div class="radar-pill-marker">BIL</div>',
      iconSize: [34, 20],
      iconAnchor: [17, 10]
    });
    L.marker(bilogoraRadarCircle, { icon: bilogoraPillIcon })
      .addTo(map)
      .bindTooltip('Bilogora');

    map.invalidateSize();
    
    // Custom zoom control in top-right, below header
    var zoomControl = L.control({position: 'topright'});
    
    zoomControl.onAdd = function(map) {
      var div = L.DomUtil.create('div', 'custom-zoom');
      div.innerHTML = 
        '<a href="#" class="leaflet-control-zoom-in" title="Zoom in">+</a>' +
        '<a href="#" class="leaflet-control-zoom-out" title="Zoom out">−</a>';
      
      // Add click functionality
      div.querySelector('.leaflet-control-zoom-in').addEventListener('click', function(e) {
        e.preventDefault();
        map.zoomIn();
      });
      
      div.querySelector('.leaflet-control-zoom-out').addEventListener('click', function(e) {
        e.preventDefault();
        map.zoomOut();
      });
      
      return div;
    };
    
    zoomControl.addTo(map);

</script>
