.synoptic-panel {

  left: 12px;

  min-width: 200px;
  background: rgba(33, 33, 33, 0.9);

  padding: 12px 10px 8px;
  color: #fff;
}

.synoptic-title {
  margin: 0 0 12px;
  font-size: 1rem;
  font-weight: 700;
  text-align: center;
}

.synoptic-toggles {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.toggle-column {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex: 1;
}

.toggle-label {
  font-size: 0.8rem;
  font-weight: 600;
  text-align: center;
}

.toggle-switch {
  position: relative;
  width: 48px;
  height: 26px;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.toggle-slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background: #0ea5e9;
  border: none;
  border-radius: 999px;
  transition: 0.2s ease;
}

.toggle-slider::before {
  content: '';
  position: absolute;
  height: 18px;
  width: 18px;
  left: 3px;
  top: 3px;
  border-radius: 50%;
  background-color: #ffffff;
  transition: 0.2s ease;
}

.toggle-switch input:checked + .toggle-slider {
  background: #008000;
}

.toggle-switch input:checked + .toggle-slider::before {
  transform: translateX(22px);
}

  <div class="synoptic-panel" aria-label="Sinoptička situacija panel">
    <h3 class="synoptic-title">Sinoptička situacija</h3>
    <div class="synoptic-toggles">
      <div class="toggle-column">
        <label class="toggle-switch" for="toggle-godina">
          <input type="checkbox" id="toggle-godina">
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">Po godini</span>
      </div>
      <div class="toggle-column">
        <label class="toggle-switch" for="toggle-strujanje">
          <input type="checkbox" id="toggle-strujanje">
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">Po strujanju</span>
      </div>
    </div>
  </div>



  <div class="synoptic-params-panel" id="synoptic-params-panel" aria-label="Synoptic parametri">
    <button type="button" class="synoptic-param-button" data-param="500">500 hPa</button>
    <button type="button" class="synoptic-param-button" data-param="cape">CAPE</button>
    <button type="button" class="synoptic-param-button" data-param="temp">Temp</button>
    <button type="button" class="synoptic-param-button" data-param="tros">Tros</button>
    <button type="button" class="synoptic-param-button" data-param="wind10m">Vjetar 10m</button>
  </div>

  <div class="year-panel" id="year-panel" aria-label="Popis godina">
    <div id="year-list"></div>
  </div>

  <div id="map"></div>

  <script>
    var map = L.map('map', {
  zoomControl: false,        // disable default zoom
  attributionControl: true
  }).setView([45.1, 16.0], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);
    map.invalidateSize();
    
    // Custom zoom control in top-right, below header
    var zoomControl = L.control({position: 'topright'});
    
    zoomControl.onAdd = function(map) {
      var div = L.DomUtil.create('div', 'custom-zoom');
      div.innerHTML = 
        '<a href="#" class="leaflet-control-zoom-in" title="Zoom in">+</a>' +
        '<a href="#" class="leaflet-control-zoom-out" title="Zoom out">−</a>';
      
      // Add click functionality
      div.querySelector('.leaflet-control-zoom-in').addEventListener('click', function(e) {
        e.preventDefault();
        map.zoomIn();
      });
      
      div.querySelector('.leaflet-control-zoom-out').addEventListener('click', function(e) {
        e.preventDefault();
        map.zoomOut();
      });
      
      return div;
    };
    zoomControl.addTo(map);
    map.setView([45.1, 16.0], 6);

    var synopticImageOverlay = null;
    var synopticCornerMarkers = [];
    var synopticCenterMarker = null;
    var synopticWarpCanvas = null;
    var synopticWarpCtx = null;
    var synopticImageObj = null;
    var synopticCurrentImagePath = null;

    var synopticImageCorners = {
      nw: L.latLng(50.5, 7.0),
      ne: L.latLng(50.5, 24.5),
      sw: L.latLng(39.5, 7.0),
      se: L.latLng(39.5, 24.5)
    };
    var synopticCenterPoint = L.latLng(45.0, 15.75);
    var selectedSynopticDate = null;

    function ensureWarpCanvas() {
      if (synopticWarpCanvas) return;
      synopticWarpCanvas = L.DomUtil.create('canvas', 'synoptic-warp-canvas');
      synopticWarpCanvas.style.position = 'absolute';
      synopticWarpCanvas.style.top = '0';
      synopticWarpCanvas.style.left = '0';
      synopticWarpCanvas.style.pointerEvents = 'none';
      synopticWarpCanvas.style.zIndex = '460';
      map.getPanes().overlayPane.appendChild(synopticWarpCanvas);
      synopticWarpCtx = synopticWarpCanvas.getContext('2d');
    }

    function resizeWarpCanvas() {
      if (!synopticWarpCanvas) return;
      var size = map.getSize();
      synopticWarpCanvas.width = size.x;
      synopticWarpCanvas.height = size.y;
      synopticWarpCanvas.style.width = size.x + 'px';
      synopticWarpCanvas.style.height = size.y + 'px';
    }

    function drawImageTriangle(ctx, img, s0, s1, s2, d0, d1, d2, opacity) {
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(d0.x, d0.y);
      ctx.lineTo(d1.x, d1.y);
      ctx.lineTo(d2.x, d2.y);
      ctx.closePath();
      ctx.clip();
      var denom = (s0.x*(s1.y-s2.y)+s1.x*(s2.y-s0.y)+s2.x*(s0.y-s1.y));
      if (!denom) { ctx.restore(); return; }
      var a = (d0.x*(s1.y-s2.y)+d1.x*(s2.y-s0.y)+d2.x*(s0.y-s1.y))/denom;
      var b = (d0.y*(s1.y-s2.y)+d1.y*(s2.y-s0.y)+d2.y*(s0.y-s1.y))/denom;
      var c = (d0.x*(s2.x-s1.x)+d1.x*(s0.x-s2.x)+d2.x*(s1.x-s0.x))/denom;
      var d = (d0.y*(s2.x-s1.x)+d1.y*(s0.x-s2.x)+d2.y*(s1.x-s0.x))/denom;
      var e = (d0.x*(s1.x*s2.y-s2.x*s1.y)+d1.x*(s2.x*s0.y-s0.x*s2.y)+d2.x*(s0.x*s1.y-s1.x*s0.y))/denom;
      var f = (d0.y*(s1.x*s2.y-s2.x*s1.y)+d1.y*(s2.x*s0.y-s0.x*s2.y)+d2.y*(s0.x*s1.y-s1.x*s0.y))/denom;
      ctx.globalAlpha = opacity;
      ctx.setTransform(a,b,c,d,e,f);
      ctx.drawImage(img,0,0);
      ctx.restore();
    }

    function renderSynopticImageOverlay() {
      if (!synopticImageObj || !synopticWarpCtx || !synopticWarpCanvas) return;
      resizeWarpCanvas();
      synopticWarpCtx.setTransform(1,0,0,1,0,0);
      synopticWarpCtx.clearRect(0,0,synopticWarpCanvas.width,synopticWarpCanvas.height);

      var nw = map.latLngToContainerPoint(synopticImageCorners.nw);
      var ne = map.latLngToContainerPoint(synopticImageCorners.ne);
      var sw = map.latLngToContainerPoint(synopticImageCorners.sw);
      var se = map.latLngToContainerPoint(synopticImageCorners.se);
      var cc = map.latLngToContainerPoint(synopticCenterPoint);

      var w = synopticImageObj.naturalWidth || synopticImageObj.width;
      var h = synopticImageObj.naturalHeight || synopticImageObj.height;
      var sNW={x:0,y:0}, sNE={x:w,y:0}, sSW={x:0,y:h}, sSE={x:w,y:h}, sC={x:w/2,y:h/2};

      drawImageTriangle(synopticWarpCtx, synopticImageObj, sNW,sNE,sC, nw,ne,cc, 0.75);
      drawImageTriangle(synopticWarpCtx, synopticImageObj, sNE,sSE,sC, ne,se,cc, 0.75);
      drawImageTriangle(synopticWarpCtx, synopticImageObj, sSE,sSW,sC, se,sw,cc, 0.75);
      drawImageTriangle(synopticWarpCtx, synopticImageObj, sSW,sNW,sC, sw,nw,cc, 0.75);
    }

    function clearSynopticControlMarkers() {
      for (var i = 0; i < synopticCornerMarkers.length; i++) map.removeLayer(synopticCornerMarkers[i]);
      synopticCornerMarkers = [];
      if (synopticCenterMarker) { map.removeLayer(synopticCenterMarker); synopticCenterMarker = null; }
    }

    function addSynopticControlMarkers() {
      clearSynopticControlMarkers();
      ['nw','ne','sw','se'].forEach(function(key){
        var m=L.marker(synopticImageCorners[key],{draggable:true,title:key.toUpperCase()}).addTo(map);
        m.on('drag',function(e){ synopticImageCorners[key]=e.target.getLatLng(); renderSynopticImageOverlay(); });
        synopticCornerMarkers.push(m);
      });
      synopticCenterMarker=L.marker(synopticCenterPoint,{draggable:true,title:'CENTER'}).addTo(map);
      synopticCenterMarker.on('drag',function(e){ synopticCenterPoint=e.target.getLatLng(); renderSynopticImageOverlay(); });
    }

    function clearSynopticImageOverlay() {
      synopticImageOverlay = null;
      synopticCurrentImagePath = null;
      synopticImageObj = null;
      clearSynopticControlMarkers();
      if (synopticWarpCtx && synopticWarpCanvas) {
        synopticWarpCtx.setTransform(1,0,0,1,0,0);
        synopticWarpCtx.clearRect(0,0,synopticWarpCanvas.width,synopticWarpCanvas.height);
      }
    }

    function loadSynopticImageOverlay(imagePath) {
      synopticImageOverlay = imagePath;
      synopticCurrentImagePath = imagePath;
      ensureWarpCanvas();
      resizeWarpCanvas();
      synopticImageObj = new Image();
      synopticImageObj.onload = function(){ renderSynopticImageOverlay(); };
      synopticImageObj.src = imagePath;
      addSynopticControlMarkers();
    }

    map.on('zoom move resize', function(){
      if (synopticCurrentImagePath && synopticImageObj) renderSynopticImageOverlay();
      resizeWarpCanvas();
    });

    var toggleGodinaEl = document.getElementById('toggle-godina');
    var toggleStrujanjeEl = document.getElementById('toggle-strujanje');

    function enforceExclusiveToggles(changedToggle, otherToggle) {
      if (changedToggle.checked) {
        otherToggle.checked = false;
      }
    }

    toggleGodinaEl.addEventListener('change', function() {
      enforceExclusiveToggles(toggleGodinaEl, toggleStrujanjeEl);
      updateYearPanelVisibility();
    });

    toggleStrujanjeEl.addEventListener('change', function() {
      enforceExclusiveToggles(toggleStrujanjeEl, toggleGodinaEl);
      updateYearPanelVisibility();
    });


    var yearPanelEl = document.getElementById('year-panel');
    var yearListEl = document.getElementById('year-list');
    var synopticParamsPanelEl = document.getElementById('synoptic-params-panel');

    function hideSynopticParamsPanel() {
      synopticParamsPanelEl.classList.remove('is-visible');
      clearSynopticImageOverlay();
      selectedSynopticDate = null;
      var activeParamButtons = synopticParamsPanelEl.querySelectorAll('.synoptic-param-button.is-active');
      for (var a = 0; a < activeParamButtons.length; a++) {
        activeParamButtons[a].classList.remove('is-active');
      }
    }

    function createYearList() {
      var html = '';
      for (var year = 2026; year >= 1981; year--) {
        html +=
          '<div class="year-item">' +
            '<button type="button" class="year-button" data-year="' + year + '">' + year + '.</button>' +
            '<div class="months-list" id="months-' + year + '">' +
              (year === 2006
                ? '<div class="month-item">' +
                    '<button type="button" class="months-button" data-month="svibanj-2006">Svibanj</button>' +
                    '<div class="dates-list" id="dates-svibanj-2006"><button type="button" class="date-button" data-date="2006-05-19">19.05.2006.</button></div>' +
                  '</div>' +
                  '<div class="month-item">' +
                    '<button type="button" class="months-button" data-month="lipanj-2006">Lipanj</button>' +
                    '<div class="dates-list" id="dates-lipanj-2006"><button type="button" class="date-button" data-date="2006-06-29">29.06.2006.</button></div>' +
                  '</div>' +
                  '<div class="month-item">' +
                    '<button type="button" class="months-button" data-month="kolovoz-2006">August</button>' +
                    '<div class="dates-list" id="dates-kolovoz-2006"><button type="button" class="date-button" data-date="2006-08-01">01.08.2006.</button><button type="button" class="date-button" data-date="2006-08-03">03.08.2006.</button></div>' +
                  '</div>'
                : 'Mjeseci za ' + year + '. bit će dodani uskoro.') +
            '</div>' +
          '</div>';
      }
      yearListEl.innerHTML = html;

      var yearButtons = yearListEl.querySelectorAll('.year-button');
      for (var i = 0; i < yearButtons.length; i++) {
        yearButtons[i].addEventListener('click', function() {
          var selectedYear = this.getAttribute('data-year');
          var monthsEl = document.getElementById('months-' + selectedYear);
          monthsEl.classList.toggle('is-open');
          hideSynopticParamsPanel();
        });
      }

      var monthButtons = yearListEl.querySelectorAll('.months-button');
      for (var j = 0; j < monthButtons.length; j++) {
        monthButtons[j].addEventListener('click', function() {
          var selectedMonth = this.getAttribute('data-month');
          var datesEl = document.getElementById('dates-' + selectedMonth);
          datesEl.classList.toggle('is-open');
          hideSynopticParamsPanel();
        });
      }

      var dateButtons = yearListEl.querySelectorAll('.date-button');
      for (var k = 0; k < dateButtons.length; k++) {
        dateButtons[k].addEventListener('click', function() {
          var clickedDate = this.getAttribute('data-date');
          selectedSynopticDate = clickedDate;
          var wasVisible = synopticParamsPanelEl.classList.contains('is-visible');

          if (wasVisible) {
            hideSynopticParamsPanel();
            clearSynopticImageOverlay();
            return;
          }

          synopticParamsPanelEl.classList.add('is-visible');

          if (clickedDate === '2006-05-19') {
            var defaultParamButton = document.querySelector('.synoptic-param-button[data-param="500"]');
            hideSynopticParamsPanel();
            synopticParamsPanelEl.classList.add('is-visible');
            selectedSynopticDate = clickedDate;
            if (defaultParamButton) defaultParamButton.classList.add('is-active');
            loadSynopticImageOverlay('images/supercells/20060519/wind500.png');
          } else {
            clearSynopticImageOverlay();
          }
        });
      }
    }

    function updateYearPanelVisibility() {
      yearPanelEl.classList.toggle('is-visible', toggleGodinaEl.checked);
      if (!toggleGodinaEl.checked) {
        var openMonths = yearPanelEl.querySelectorAll('.months-list.is-open');
        for (var i = 0; i < openMonths.length; i++) {
          openMonths[i].classList.remove('is-open');
        }
        var openDates = yearPanelEl.querySelectorAll('.dates-list.is-open');
        for (var j = 0; j < openDates.length; j++) {
          openDates[j].classList.remove('is-open');
        }
        hideSynopticParamsPanel();
      }
    }

    createYearList();
    updateYearPanelVisibility();

    var synopticParamButtons = document.querySelectorAll('.synoptic-param-button');
    for (var pIdx = 0; pIdx < synopticParamButtons.length; pIdx++) {
      synopticParamButtons[pIdx].addEventListener('click', function() {
        var isAlreadyActive = this.classList.contains('is-active');
        for (var clearIdx = 0; clearIdx < synopticParamButtons.length; clearIdx++) {
          synopticParamButtons[clearIdx].classList.remove('is-active');
        }

        if (isAlreadyActive) {
          clearSynopticImageOverlay();
          return;
        }

        this.classList.add('is-active');

        var paramId = this.getAttribute('data-param');
        if (paramId === '500' && selectedSynopticDate === '2006-05-19') {
          loadSynopticImageOverlay('images/supercells/20060519/wind500.png');
        } else {
          clearSynopticImageOverlay();
        }
      });
    }

  </script>
